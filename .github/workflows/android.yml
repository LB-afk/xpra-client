name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21' # Updated this to 21 to match your step name
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug # Changed 'build' to 'assembleDebug' for a faster APK-only build

    - name: Upload APK
      uses: actions/upload-artifact@v4 # Use v4 (stable) unless you have a specific reason for v7-beta
      with:
        name: android-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: error
        retention-days: 7
